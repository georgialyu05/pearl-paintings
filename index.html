<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pearl Paintings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="scene">
    <img id="bg" src="./public/bg.jpg" />
    <div id="bg-blur"></div>
    <canvas id="pearls"></canvas>
    <img id="neck" src="./public/neck.png" />
  </div>

  <div id="hover-card">
    <div id="hover-title"></div>
    <div id="hover-frame">
      <img id="hover-img" src="" alt="" />
    </div>
    <div id="hover-info">
      <div id="hover-artist"></div>
      <div id="hover-year"></div>
    </div>
  </div>

  <svg id="thread-svg">
    <path id="thread-path" fill="none"/>
  </svg>

  <script src="script.js"></script>
</body>
</html>
